name: Python_linter

on:
  push:
    paths: "*.py"

jobs:
  Linter:
    runs-on: ubuntu-latest
    steps:
       - name: Cloning the code
         uses: actions/checkout@v7

       - name: Setup Python
         uses: actions/setup-python@v5
        with:
          python-version: '3.12'

       - name: Linter installation
         run: pip install ruff

        - name: Check files for linting
          run: ruff check .
         
  
